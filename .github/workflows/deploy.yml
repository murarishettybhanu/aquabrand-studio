# Deploy to GitHub Pages
# Builds the Vite/TanStack Start app and deploys the static client output
# to GitHub Pages on every push to the main branch.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # Allow manual trigger

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run
# in-progress and latest queued. Do NOT cancel in-progress runs as we want to
# allow these deployments to complete.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Find build output
        id: find_output
        run: |
          # TanStack Start with Cloudflare outputs to .output/public/
          # Fallback to dist/client or dist/ if that doesn't exist
          if [ -d ".output/public" ]; then
            echo "dir=.output/public" >> "$GITHUB_OUTPUT"
          elif [ -d "dist/client" ]; then
            echo "dir=dist/client" >> "$GITHUB_OUTPUT"
          elif [ -d "dist" ]; then
            echo "dir=dist" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Could not find build output directory"
            exit 1
          fi

      - name: Add .nojekyll
        run: touch ${{ steps.find_output.outputs.dir }}/.nojekyll

      - name: Add 404 fallback for SPA routing
        run: cp ${{ steps.find_output.outputs.dir }}/index.html ${{ steps.find_output.outputs.dir }}/404.html 2>/dev/null || true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.find_output.outputs.dir }}

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
